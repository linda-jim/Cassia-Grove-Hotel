<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cassia Grove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <section class="hero-section">
      <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
          <a class="navbar-brand" href="#">Cassia Grove</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div
            class="collapse navbar-collapse justify-content-center"
            id="navbarNav"
          >
            <ul class="navbar-nav gap-4">
              <li class="nav-item"><a class="nav-link" href="#">About</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Rooms</a></li>
              <li class="nav-item">
                <a class="nav-link" href="#">Amenities</a>
              </li>
              <li class="nav-item">
                <a class="nav-link book-btn" href="#">Book Now</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container hero-content text-center">
        <div class="floating-cards">
          <div class="info-card rotate-left">Airport Transfer</div>
          <div class="info-card">Luxury Rooms</div>
          <div class="info-card rotate-right">Kerala Breakfast</div>
        </div>

        <h1>Experience Quiet Luxury</h1>
        <p>
          A modern boutique stay just minutes from Cochin Airport, designed for
          comfort, calm, and effortless travel.
        </p>

        <a href="#" class="btn explore-btn">Explore Rooms</a>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
